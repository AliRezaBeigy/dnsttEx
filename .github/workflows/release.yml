name: Build and Release

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          go test -tags=integration -v -timeout 120s -short ./dnstt-server/ ./dnstt-client/ ./integration/ ./dns/ ./noise/ ./turbotunnel/

  build:
    needs: test
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_suffix: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_suffix: linux-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_suffix: windows-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_suffix: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_suffix: darwin-arm64
      fail-fast: false

    runs-on: ${{ matrix.os }}
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      ASSET_SUFFIX: ${{ matrix.asset_suffix }}
      EXE_EXT: ${{ matrix.goos == 'windows' && '.exe' || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p build_assets
          go build -o build_assets/dnsttEx-client-${{ env.ASSET_SUFFIX }}${{ env.EXE_EXT }} -ldflags="-s -w" ./dnstt-client
          go build -o build_assets/dnsttEx-server-${{ env.ASSET_SUFFIX }}${{ env.EXE_EXT }} -ldflags="-s -w" ./dnstt-server
          if [ "${{ matrix.goos }}" != "windows" ]; then
            chmod +x build_assets/dnsttEx-client-${{ env.ASSET_SUFFIX }}${{ env.EXE_EXT }}
            chmod +x build_assets/dnsttEx-server-${{ env.ASSET_SUFFIX }}${{ env.EXE_EXT }}
          fi

      - name: Get tag name
        id: get_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
            if [[ -z "$TAG" ]]; then
              echo "tag=dev" >> $GITHUB_OUTPUT
              echo "Using tag: dev (workflow_dispatch)"
              exit 0
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Create Release and upload binaries (on push tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          files: |
            build_assets/dnsttEx-client-${{ env.ASSET_SUFFIX }}${{ env.EXE_EXT }}
            build_assets/dnsttEx-server-${{ env.ASSET_SUFFIX }}${{ env.EXE_EXT }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dnsttEx-${{ env.ASSET_SUFFIX }}
          path: |
            build_assets/dnsttEx-client-${{ env.ASSET_SUFFIX }}${{ env.EXE_EXT }}
            build_assets/dnsttEx-server-${{ env.ASSET_SUFFIX }}${{ env.EXE_EXT }}
          retention-days: 7
